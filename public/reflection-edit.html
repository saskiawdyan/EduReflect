<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Refleksi | EduReflect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/logo.png" type="image/png" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-logo">
      <img src="assets/logo.png" alt="EduReflect" class="logo" />
      <h1>EduReflect</h1>
    </div>
    <ul class="nav-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="reflection.html">Refleksi</a></li>
      <li><a href="report.html">Laporan</a></li>
      <li><a href="#" id="logoutLink">Logout</a></li>
    </ul>
    <div class="nav-controls">
      <button id="theme-toggle" class="btn-icon" title="Ganti tema">🌙</button>
      
      <button id="nav-toggle-btn" class="btn-icon nav-toggle-btn" title="Menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
    
  </nav>

  <main class="container">
    <section class="reflection-form">
      <h2>Edit Refleksi ✍️</h2>
      <p class="muted">Perbarui catatan refleksi harianmu.</p>

      <form id="reflectionEditForm">
        <div class="form-group">
          <label for="title">Judul Refleksi</label>
          <input type="text" id="title" name="title" required placeholder="Memuat..." />
        </div>

        <div class="form-group">
          <label for="content">Apa yang kamu pelajari hari ini?</label>
          <textarea id="content" name="content" rows="4" required placeholder="Memuat..."></textarea>
        </div>

        <div class="form-group">
          <label for="mood">Bagaimana perasaanmu saat belajar?</label>
          <select id="mood" name="mood" required>
            <option value="">Memuat...</option>
            <option value="high">Senang / Bersemangat</option>
            <option value="mid">Biasa / Tenang</option>
            <option value="low">Malas / Kesulitan</option>
          </select>
        </div>

        <button type="submit" id="submitBtn" class="btn-primary">Simpan Perubahan</button>
      </form>

      <p id="statusMessage" class="status"></p>
      
      <div style="text-align: center; margin-top: 2rem;">
        <a href="report.html" class="btn-secondary">⬅️ Batal & Kembali ke Laporan</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p class="copy">© 2025 EduReflect. Dibuat dengan ❤️ untuk pendidikan.</p>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/api.js"></script>
  <script src="js/reflection-edit.js"></script>
</body>
</html>
